<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ─── CSS Variables ──────────────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card:      #1c2030;
      --border:    #252a3a;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --accent3:   #43e8a0;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --todo:      #6c63ff;
      --prog:      #f59e0b;
      --done:      #43e8a0;
      --high:      #ff6584;
      --med:       #f59e0b;
      --low:       #43e8a0;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,0.4);
    }

    /* ─── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated Background ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(67,232,160,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ────────────────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(21,24,32,0.8);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 16px;
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .header-actions { display: flex; gap: 12px; align-items: center; }

    .stats-pill {
      display: flex; gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.72rem;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ─── Add Task Button ───────────────────────────────────────────── */
    .btn-add {
      background: linear-gradient(135deg, var(--accent), #5248d4);
      color: white; border: none; cursor: pointer;
      padding: 10px 20px; border-radius: 100px;
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s; letter-spacing: 0.2px;
      box-shadow: 0 4px 16px rgba(108,99,255,0.35);
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.5); }
    .btn-add:active { transform: translateY(0); }

    /* ─── Kanban Board ──────────────────────────────────────────────── */
    .board-wrap {
      position: relative; z-index: 1;
      padding: 32px 40px;
      max-width: 1400px; margin: 0 auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: start;
    }

    /* ─── Column ────────────────────────────────────────────────────── */
    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .column.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(108,99,255,0.25);
    }

    .col-header {
      padding: 18px 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .col-label {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
    }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; }
    .col-count {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 10px; font-size: 0.72rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ─── Card List ─────────────────────────────────────────────────── */
    .card-list {
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 100px;
    }

    /* ─── Task Card ─────────────────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: grab;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s ease forwards;
    }
    .task-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .task-card:hover {
      border-color: rgba(108,99,255,0.4);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .task-card:active { cursor: grabbing; opacity: 0.7; transform: rotate(1.5deg) scale(0.97); }
    .task-card.dragging { opacity: 0.4; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Priority accent bar */
    .task-card[data-priority="high"]::before   { background: var(--high); }
    .task-card[data-priority="medium"]::before { background: var(--med); }
    .task-card[data-priority="low"]::before    { background: var(--low); }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.92rem; font-weight: 700;
      line-height: 1.35; flex: 1;
      padding-left: 8px;
    }

    .card-actions {
      display: flex; gap: 4px; opacity: 0;
      transition: opacity 0.2s;
    }
    .task-card:hover .card-actions { opacity: 1; }

    .btn-icon {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 28px; height: 28px; border-radius: 8px;
      display: grid; place-items: center; font-size: 13px;
      transition: all 0.15s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }
    .btn-icon.delete:hover { color: var(--high); border-color: var(--high); }

    .card-desc {
      font-size: 0.76rem; color: var(--muted);
      line-height: 1.5; margin-bottom: 12px;
      padding-left: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 8px;
    }

    .priority-badge {
      font-size: 0.68rem; font-weight: 500; padding: 3px 9px;
      border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .priority-high   { background: rgba(255,101,132,0.15); color: var(--high); }
    .priority-medium { background: rgba(245,158,11,0.15);  color: var(--med);  }
    .priority-low    { background: rgba(67,232,160,0.15);  color: var(--low);  }

    .card-date { font-size: 0.68rem; color: var(--muted); }

    /* Move buttons */
    .move-btns { display: flex; gap: 4px; margin-top: 10px; padding-left: 8px; }
    .move-btn {
      font-size: 0.65rem; padding: 4px 10px; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .move-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(108,99,255,0.1); }

    /* ─── Empty State ───────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 32px 20px;
      color: var(--muted); font-size: 0.78rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      line-height: 1.6;
    }
    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

    /* ─── Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 480px; max-width: 92vw;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem; font-weight: 800;
    }
    .btn-close {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 34px; height: 34px; border-radius: 10px;
      display: grid; place-items: center; font-size: 16px;
      transition: all 0.15s;
    }
    .btn-close:hover { color: var(--text); border-color: var(--accent2); }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.75rem; color: var(--muted);
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 0.85rem; padding: 11px 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .form-textarea { resize: vertical; min-height: 90px; }
    .form-select { cursor: pointer; }
    .form-select option { background: var(--card); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), #5248d4);
      color: white; border: none; cursor: pointer;
      border-radius: 12px; font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      transition: all 0.2s; letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(108,99,255,0.3);
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.45); }

    /* ─── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      font-size: 0.82rem; display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-icon { font-size: 1.1rem; }

    /* ─── Loading spinner ───────────────────────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      header { padding: 16px 20px; }
      .board-wrap { padding: 20px; }
      .stats-pill { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Task<span>Flow</span></h1>
  </div>
  <div class="header-actions">
    <div class="stats-pill">
      <div class="stat"><div class="stat-dot" style="background:var(--todo)"></div><span id="stat-todo">0 todo</span></div>
      <div class="stat"><div class="stat-dot" style="background:var(--prog)"></div><span id="stat-prog">0 in progress</span></div>
      <div class="stat"><div class="stat-dot" style="background:var(--done)"></div><span id="stat-done">0 done</span></div>
    </div>
    <button class="btn-add" onclick="openModal()">
      <span>＋</span> New Task
    </button>
  </div>
</header>

<!-- ─── Board ───────────────────────────────────────────────────────────── -->
<div class="board-wrap">
  <div class="board">

    <!-- To Do -->
    <div class="column" id="col-todo" ondragover="onDragOver(event,'todo')" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <div class="col-label">
          <div class="col-dot" style="background:var(--todo)"></div>
          To Do
        </div>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="card-list" id="list-todo"></div>
    </div>

    <!-- In Progress -->
    <div class="column" id="col-inprogress" ondragover="onDragOver(event,'inprogress')" ondrop="onDrop(event,'inprogress')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <div class="col-label">
          <div class="col-dot" style="background:var(--prog)"></div>
          In Progress
        </div>
        <span class="col-count" id="count-inprogress">0</span>
      </div>
      <div class="card-list" id="list-inprogress"></div>
    </div>

    <!-- Done -->
    <div class="column" id="col-done" ondragover="onDragOver(event,'done')" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <div class="col-label">
          <div class="col-dot" style="background:var(--done)"></div>
          Done
        </div>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="card-list" id="list-done"></div>
    </div>

  </div>
</div>

<!-- ─── Modal ───────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Task</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="inp-title" placeholder="e.g. Design login page" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="inp-desc" placeholder="Add more details..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="inp-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="inp-status">
          <option value="todo">To Do</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date</label>
      <input class="form-input" id="inp-due" type="date" />
    </div>
    <button class="btn-submit" onclick="submitTask()">Create Task</button>
  </div>
</div>

<!-- ─── Toast ───────────────────────────────────────────────────────────── -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✅</span>
  <span id="toast-msg">Done!</span>
</div>

<!-- ─── JavaScript ──────────────────────────────────────────────────────── -->
<script>
  const API = "http://localhost:5000/api/tasks";

  let dragId = null;
  let editId = null;

  // ─── Fetch & Render ──────────────────────────────────────────────────────
  async function loadTasks() {
    ["todo","inprogress","done"].forEach(s => {
      document.getElementById(`list-${s}`).innerHTML = `<div class="spinner"></div>`;
    });

    const res = await fetch(API);
    const { data } = await res.json();
    renderAll(data);
  }

  function renderAll(tasks) {
    const cols = { todo: [], inprogress: [], done: [] };
    tasks.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

    ["todo","inprogress","done"].forEach(s => {
      const list = document.getElementById(`list-${s}`);
      document.getElementById(`count-${s}`).textContent = cols[s].length;
      if (cols[s].length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>No tasks here yet.<br/>Drag one in or create new.</div>`;
      } else {
        list.innerHTML = cols[s].map(renderCard).join('');
      }
    });

    document.getElementById('stat-todo').textContent = `${cols.todo.length} todo`;
    document.getElementById('stat-prog').textContent = `${cols.inprogress.length} in progress`;
    document.getElementById('stat-done').textContent = `${cols.done.length} done`;
  }

  function renderCard(t) {
    const fmtDate = t.dueDate
      ? new Date(t.dueDate).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' })
      : '';

    const moves = {
      todo:       ['→ In Progress', 'inprogress'],
      inprogress: ['← To Do|→ Done', null],
      done:       ['← In Progress', 'inprogress'],
    };

    let moveBtns = '';
    if (t.status === 'todo') {
      moveBtns = `<button class="move-btn" onclick="moveTask('${t._id}','inprogress')">→ In Progress</button>`;
    } else if (t.status === 'inprogress') {
      moveBtns = `
        <button class="move-btn" onclick="moveTask('${t._id}','todo')">← To Do</button>
        <button class="move-btn" onclick="moveTask('${t._id}','done')">→ Done</button>
      `;
    } else if (t.status === 'done') {
      moveBtns = `<button class="move-btn" onclick="moveTask('${t._id}','inprogress')">← In Progress</button>`;
    }

    return `
      <div class="task-card"
           data-id="${t._id}"
           data-priority="${t.priority}"
           draggable="true"
           ondragstart="onDragStart(event,'${t._id}')"
           ondragend="onDragEnd(event)">
        <div class="card-top">
          <div class="card-title">${escHtml(t.title)}</div>
          <div class="card-actions">
            <button class="btn-icon" onclick="openEditModal('${t._id}')" title="Edit">✏️</button>
            <button class="btn-icon delete" onclick="deleteTask('${t._id}')" title="Delete">🗑</button>
          </div>
        </div>
        ${t.description ? `<div class="card-desc">${escHtml(t.description)}</div>` : ''}
        <div class="card-footer">
          <span class="priority-badge priority-${t.priority}">${t.priority}</span>
          ${fmtDate ? `<span class="card-date">📅 ${fmtDate}</span>` : ''}
        </div>
        <div class="move-btns">${moveBtns}</div>
      </div>
    `;
  }

  // ─── CRUD ────────────────────────────────────────────────────────────────
  async function submitTask() {
    const title = document.getElementById('inp-title').value.trim();
    if (!title) { showToast('Please enter a task title', '⚠️'); return; }

    const body = {
      title,
      description: document.getElementById('inp-desc').value.trim(),
      priority:    document.getElementById('inp-priority').value,
      status:      document.getElementById('inp-status').value,
      dueDate:     document.getElementById('inp-due').value || null,
    };

    if (editId) {
      await fetch(`${API}/${editId}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      showToast('Task updated!', '✏️');
      editId = null;
    } else {
      await fetch(API, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      showToast('Task created!', '✅');
    }

    closeModal();
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    showToast('Task deleted', '🗑');
    loadTasks();
  }

  async function moveTask(id, newStatus) {
    await fetch(`${API}/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    showToast(`Moved!`, '🚀');
    loadTasks();
  }

  async function openEditModal(id) {
    const res = await fetch(`${API}/${id}`);
    const { data: t } = await res.json();
    editId = id;
    document.getElementById('modal-title').textContent = 'Edit Task';
    document.getElementById('inp-title').value    = t.title;
    document.getElementById('inp-desc').value     = t.description || '';
    document.getElementById('inp-priority').value = t.priority;
    document.getElementById('inp-status').value   = t.status;
    document.getElementById('inp-due').value      = t.dueDate ? t.dueDate.slice(0,10) : '';
    document.querySelector('.btn-submit').textContent = 'Update Task';
    openModal();
  }

  // ─── Drag & Drop ─────────────────────────────────────────────────────────
  function onDragStart(e, id) {
    dragId = id;
    e.currentTarget.classList.add('dragging');
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
  }
  function onDragOver(e, col) {
    e.preventDefault();
    document.getElementById(`col-${col}`).classList.add('drag-over');
  }
  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }
  async function onDrop(e, status) {
    e.currentTarget.classList.remove('drag-over');
    if (!dragId) return;
    await fetch(`${API}/${dragId}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    dragId = null;
    showToast('Moved via drag!', '🎯');
    loadTasks();
  }

  // ─── Modal ───────────────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editId = null;
    document.getElementById('modal-title').textContent = 'New Task';
    document.querySelector('.btn-submit').textContent = 'Create Task';
    ['inp-title','inp-desc','inp-due'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inp-priority').value = 'medium';
    document.getElementById('inp-status').value = 'todo';
  }
  function closeModalOnBg(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ─── Toast ───────────────────────────────────────────────────────────────
  function showToast(msg, icon = '✅') {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ─── Utils ───────────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Init ────────────────────────────────────────────────────────────────
  loadTasks();
</script>
</body>
</html>
